<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página con Acceso</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; font-family: Arial, sans-serif; overflow:hidden; }

/* VIDEO */
.video-background {
    position: fixed; top:0; left:0; width:100%; height:100%;
    z-index:-1;
}
.video-background video {
    width:100%; height:100%; object-fit:cover;
}

/* MARCA DE AGUA (SKIPPERTV PRÓXIMAMENTE) */
.watermark {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.4); /* Color blanco con transparencia */
    font-size: 12px; /* Letras pequeñas */
    letter-spacing: 2px;
    text-align: center;
    pointer-events: none; /* No interfiere con clics */
    z-index: 2;
    animation: fadeIn 2s ease;
}

@keyframes fadeIn {
    from {opacity:0;} to {opacity:1;}
}

/* OFFLINE CANVAS */
#offlineCanvas {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:black;
    z-index:5;
}

/* OFFLINE PANEL */
.offline-box {
    display:none;
    position:fixed;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    background:#0a0a0a;
    border:2px solid #00ffe0;
    border-radius:20px;
    padding:40px;
    text-align:center;
    color:white;
    z-index:10;
    box-shadow:0 0 25px rgba(0,255,224,0.7);
    animation: popup 0.5s ease;
}
.offline-box h1 {
    font-size:28px;
    margin-bottom:15px;
}
.offline-box p {
    color:#bbb;
}

@keyframes popup {
    0% {transform:translate(-50%,-60%) scale(0.6); opacity:0;}
    100% {transform:translate(-50%,-50%) scale(1); opacity:1;}
}
</style>
</head>

<body>

<div class="video-background">
    <video autoplay muted loop playsinline>
        <source src="https://moewalls.com/wp-content/uploads/preview/2025/purple-tree-at-sunset-preview.webm" type="video/webm">
    </video>
</div>

<div class="watermark">
    SKIPPERTV <br> CARGANDO CONTENIDO
</div>

<canvas id="offlineCanvas"></canvas>

<div class="offline-box" id="offlineBox">
    <h1>Sin conexión</h1>
    <p>No se puede acceder al contenido.<br>Verifica tu conexión a Internet.</p>
</div>

<script>
/* BLOQUEO GLOBAL DE ERRORES */
window.onerror = function () {
    return true; 
};

window.addEventListener("unhandledrejection", function (e) {
    e.preventDefault();
});

/* OFFLINE DETECTION */
const canvas = document.getElementById('offlineCanvas');
const ctx = canvas.getContext('2d');
let stars = [];

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function initStars(){
    stars = [];
    for(let i=0;i<100;i++){
        stars.push({
            x: Math.random()*canvas.width,
            y: Math.random()*canvas.height,
            size: Math.random()*2,
            speed: Math.random()*0.5
        });
    }
}

function animateStars(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "white";
    stars.forEach(s=>{
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
        ctx.fill();

        s.y += s.speed;
        if(s.y > canvas.height) s.y = 0;
    });
    requestAnimationFrame(animateStars);
}

function updateStatus(){
    const video = document.querySelector('.video-background');
    const watermark = document.querySelector('.watermark');
    const box = document.getElementById('offlineBox');

    if(!navigator.onLine){
        video.style.display = 'none';
        watermark.style.display = 'none';
        canvas.style.display = 'block';
        box.style.display = 'block';

        initStars();
        animateStars();
    } else {
        video.style.display = 'block';
        watermark.style.display = 'block';
        canvas.style.display = 'none';
        box.style.display = 'none';
    }
}

window.addEventListener('load', updateStatus);
window.addEventListener('online', updateStatus);
window.addEventListener('offline', updateStatus);

/* REDIRECCIÓN AUTOMÁTICA A LOS 40 SEGUNDOS */
setTimeout(function() {
    window.location.href = "https://raw.githubusercontent.com/shundearies/Canales-Iptv/refs/heads/main/PlusCineyseries.json.xxx";
}, 40000);
</script>

</body>
</html>
